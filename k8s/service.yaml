apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: udesamigos
  labels:
    app: api-gateway
spec:
  # ClusterIP: el Service solo es accesible DENTRO del cluster.
  # El acceso externo lo maneja el Ingress, no el Service directamente.
  type: ClusterIP

  # El selector conecta el Service con los pods del Deployment.
  # Cuando llega tráfico al Service, K8s lo balancea entre todos los pods
  # que tengan la label app=api-gateway y estén en estado Ready.
  selector:
    app: api-gateway

  ports:
    - name: http
      # port: el puerto por el que otros pods hablan con este Service.
      # Cuando users service llame a http://api-gateway:4000, llega acá.
      port: 4000
      # targetPort: el puerto al que el Service redirige dentro del pod.
      # Debe coincidir con containerPort del Deployment.
      targetPort: 4000
      protocol: TCP
