apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: group-3
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: <ECR_URI>/udesamigos/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secret
                  key: JWT_SECRET
            - name: ADMIN_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secret
                  key: ADMIN_JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secret
                  key: REDIS_URL
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secret
                  key: INTERNAL_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
