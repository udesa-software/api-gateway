apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: udesamigos
# type: Opaque es para secretos de formato libre (clave-valor arbitrarios)
type: Opaque
# stringData acepta texto plano; Kubernetes lo convierte a base64 internamente.
# Los valores reales vienen de GitHub Secrets, inyectados por el pipeline
# con: envsubst < secret.template.yaml > secret.yaml
stringData:
  JWT_SECRET: "${JWT_SECRET}"
  REDIS_URL: "${REDIS_URL}"
  INTERNAL_SECRET: "${INTERNAL_SECRET}"
